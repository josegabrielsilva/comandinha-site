# Secrets (Settings → Secrets and variables → Actions):
#   FTP_HOST, FTP_USER, FTP_PASSWORD  — obrigatórios
#   CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN — opcionais (purge após deploy)

name: Deploy HostGator

on:
  push:
    branches:
      - main
      - feat/landing-page-inicial
    paths:
      - 'index.html'
      - 'privacidade.html'
      - 'termos.html'
      - '.htaccess'
      - 'css/**'
      - 'js/**'
      - 'assets/**'
      - 'scripts/prepare-deploy.sh'
      - '.github/workflows/hostgator-deploy.yml'
  workflow_dispatch:

concurrency:
  group: hostgator-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site bundle
        run: bash scripts/prepare-deploy.sh dist

      - name: Deploy to public_html (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: public_html/
          protocol: ftps
          dangerous-clean-slate: false

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "$CLOUDFLARE_ZONE_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "Secrets CLOUDFLARE_* não configurados — pulando purge."
            exit 0
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Cache do Cloudflare purgado."
