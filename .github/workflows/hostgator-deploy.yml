# Secrets (Settings → Secrets and variables → Actions):
#   FTP_HOST     — hostname do SERVIDOR no cPanel (ex: gator4321.hostgator.com)
#                  NÃO use usecomandinha.com.br nem ftp.usecomandinha.com.br (Cloudflare bloqueia FTP/SFTP)
#   FTP_USER, FTP_PASSWORD — usuário e senha FTP/cPanel
#   FTP_PORT     — opcional, padrão 22 (SFTP)
#   FTP_REMOTE_DIR — opcional, padrão public_html
#   CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN — opcionais (purge após deploy)

name: Deploy HostGator

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'privacidade.html'
      - 'termos.html'
      - '.htaccess'
      - 'css/**'
      - 'js/**'
      - 'assets/**'
      - 'scripts/prepare-deploy.sh'
      - '.github/workflows/hostgator-deploy.yml'
  workflow_dispatch:

concurrency:
  group: hostgator-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site bundle
        run: bash scripts/prepare-deploy.sh dist

      - name: Deploy to public_html (SFTP)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          FTP_PORT="${FTP_PORT:-22}"
          FTP_REMOTE_DIR="${FTP_REMOTE_DIR:-public_html}"
          echo "Enviando dist/ para sftp://${FTP_HOST}:${FTP_PORT}/${FTP_REMOTE_DIR}"
          lftp <<EOF
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 2
          open -u "${FTP_USER}","${FTP_PASSWORD}" sftp://${FTP_HOST}:${FTP_PORT}
          lcd dist
          cd ${FTP_REMOTE_DIR}
          mirror -R --delete --verbose --exclude-glob .DS_Store
          bye
          EOF

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "$CLOUDFLARE_ZONE_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "Secrets CLOUDFLARE_* não configurados — pulando purge."
            exit 0
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Cache do Cloudflare purgado."
