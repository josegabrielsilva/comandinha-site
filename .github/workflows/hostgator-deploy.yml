# Secrets (Settings → Secrets and variables → Actions):
#   FTP_HOST     — hostname do SERVIDOR no cPanel (ex: gator4321.hostgator.com)
#                  NÃO use usecomandinha.com.br nem ftp.usecomandinha.com.br (Cloudflare bloqueia FTP/SFTP)
#   FTP_USER, FTP_PASSWORD — usuário e senha FTP/cPanel
#   FTP_PORT     — opcional, padrão 22 (SFTP)
#   FTP_REMOTE_DIR — opcional, padrão public_html
#   CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN — opcionais (purge após deploy)

name: Deploy HostGator

on:
  push:
    branches:
      - main
      - feat/landing-page-inicial
    paths:
      - 'index.html'
      - 'privacidade.html'
      - 'termos.html'
      - '.htaccess'
      - 'css/**'
      - 'js/**'
      - 'assets/**'
      - 'scripts/prepare-deploy.sh'
      - '.github/workflows/hostgator-deploy.yml'
  workflow_dispatch:

concurrency:
  group: hostgator-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site bundle
        run: bash scripts/prepare-deploy.sh dist

      - name: Deploy to public_html (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './dist/*'
          remote_path: public_html
          sftp_only: true
          sftpArgs: '-o ConnectTimeout=30 -o StrictHostKeyChecking=no'

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "$CLOUDFLARE_ZONE_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "Secrets CLOUDFLARE_* não configurados — pulando purge."
            exit 0
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Cache do Cloudflare purgado."
