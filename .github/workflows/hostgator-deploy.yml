# Secrets (Settings → Secrets and variables → Actions):
#   FTP_HOST     — hostname do SERVIDOR no cPanel (ex: br1234.hostgator.com.br)
#                  NÃO use ftp.usecomandinha.com.br (Cloudflare bloqueia no CI)
#   FTP_USER     — conta FTP do cPanel (ex: github@usecomandinha.com.br)
#   FTP_PASSWORD — senha da conta FTP (sem espaço no fim ao colar)
#   FTP_PORT     — opcional, padrão 21 (FTPS explícito)
#   FTP_REMOTE_DIR — opcional, padrão public_html (ignorado se a conta já abrir dentro dela)
#   CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN — opcionais (purge após deploy)

name: Deploy HostGator

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'privacidade.html'
      - 'termos.html'
      - '.htaccess'
      - 'css/**'
      - 'js/**'
      - 'assets/**'
      - 'scripts/prepare-deploy.sh'
      - 'scripts/ftp-upload.sh'
      - '.github/workflows/hostgator-deploy.yml'
  workflow_dispatch:

concurrency:
  group: hostgator-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site bundle
        run: bash scripts/prepare-deploy.sh dist

      - name: Deploy to public_html (FTPS)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          FTP_PORT="${FTP_PORT:-21}"
          FTP_REMOTE_DIR="${FTP_REMOTE_DIR:-public_html}"
          echo "Host: ${FTP_HOST}"
          echo "Porta: ${FTP_PORT}"
          echo "Usuário: ${FTP_USER}"
          bash scripts/ftp-upload.sh dist

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "$CLOUDFLARE_ZONE_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "Secrets CLOUDFLARE_* não configurados — pulando purge."
            exit 0
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Cache do Cloudflare purgado."
