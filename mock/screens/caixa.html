<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Caixa — mock</title>
  <link rel="stylesheet" href="../app.css" />
</head>
<body>
  <div class="app">
    <header class="app-nav">
      <div class="app-nav__unit">
        <span class="app-nav__dot" aria-hidden="true"></span>
        <span>Pastelaria da Esquina</span>
      </div>
      <div class="app-nav__user" aria-hidden="true">JG</div>
    </header>

    <main class="app-main">
      <h1 class="section-title">Caixa em tempo real</h1>

      <div class="cash-summary">
        <div class="cash-stat">
          <div class="cash-stat__label">Vendas hoje</div>
          <div class="cash-stat__value">R$ 847,00</div>
        </div>
        <div class="cash-stat">
          <div class="cash-stat__label">Comandas</div>
          <div class="cash-stat__value">23</div>
        </div>
      </div>

      <article class="cash-card">
        <div class="cash-card__label">Sessão aberta</div>
        <div class="cash-card__title">Caixa principal</div>
        <div class="cash-card__meta">Aberto 08:12 · 4h 35min</div>
        <div class="cash-card__value">R$ 312,00 · 3 comandas abertas</div>
      </article>

      <article class="cash-card">
        <div class="cash-card__label">Último fechamento</div>
        <div class="cash-card__title">Mesa 2 · Ana</div>
        <div class="cash-card__value">R$ 42,00</div>
      </article>
    </main>

    <nav class="bottom-nav" aria-label="Navegação">
      <div class="bottom-nav__item">
        <span class="bottom-nav__icon" aria-hidden="true"></span>
        Início
      </div>
      <div class="bottom-nav__fab-wrap">
        <div class="bottom-nav__fab" aria-hidden="true">+</div>
        <span class="bottom-nav__fab-label">Nova comanda</span>
      </div>
      <div class="bottom-nav__item bottom-nav__item--active">
        <span class="bottom-nav__icon" aria-hidden="true"></span>
        Menu
      </div>
    </nav>
  </div>
</body>
</html>
