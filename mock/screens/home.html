<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Mesas — mock</title>
  <link rel="stylesheet" href="../app.css" />
</head>
<body>
  <div class="app">
    <header class="app-nav">
      <div class="app-nav__unit">
        <span class="app-nav__dot" aria-hidden="true"></span>
        <span>Pastelaria da Esquina</span>
      </div>
      <div class="app-nav__user" aria-hidden="true">JG</div>
    </header>

    <main class="app-main">
      <h1 class="section-title">Mesas (4)</h1>

      <div class="mesa-grid">
        <article class="mesa-card mesa-card--active">
          <div class="mesa-card__head">
            <span class="mesa-card__code">M4</span>
            <span class="mesa-card__seats">4 lug.</span>
          </div>
          <div class="mesa-card__chip">
            <div class="mesa-card__customer">João</div>
            <div class="comanda-card__actions">
              <div class="comanda-card__action">
                <span class="action-icon action-icon--eye" aria-hidden="true"></span>
                Ver itens
              </div>
              <div class="comanda-card__action">
                <span class="action-icon action-icon--plus" aria-hidden="true"></span>
                Adicionar
              </div>
            </div>
          </div>
          <button class="mesa-card__btn" type="button">+ Abrir comanda</button>
        </article>

        <article class="mesa-card mesa-card--idle">
          <div class="mesa-card__head">
            <span class="mesa-card__code">M2</span>
            <span class="mesa-card__seats" style="color:white">2 lug.</span>
          </div>
          <button class="mesa-card__btn" type="button">+ Abrir comanda</button>
        </article>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Navegação">
      <div class="bottom-nav__item bottom-nav__item--active">
        <span class="bottom-nav__icon" aria-hidden="true"></span>
        Início
      </div>
      <div class="bottom-nav__fab-wrap">
        <div class="bottom-nav__fab" aria-hidden="true">+</div>
        <span class="bottom-nav__fab-label">Nova comanda</span>
      </div>
      <div class="bottom-nav__item">
        <span class="bottom-nav__icon" aria-hidden="true"></span>
        Menu
      </div>
    </nav>
  </div>
</body>
</html>
